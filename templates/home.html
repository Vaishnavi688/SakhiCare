{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SakhiCare Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & Fonts */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fef9f0, #ffe5e0);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    /* Main Container */
    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #fff;
      border-radius: 25px;
      padding: 50px;
      max-width: 1000px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      animation: fadeIn 1s ease forwards;
      gap: 40px;
    }

    @keyframes fadeIn {
      0% {opacity: 0; transform: translateY(20px);}
      100% {opacity: 1; transform: translateY(0);}
    }

    /* Left Image Section */
    .left-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .left-section img {
      width: 90%;
      max-width: 400px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(15px); }
    }

    /* Right Section */
    .right-section {
      flex: 1;
      text-align: center;
    }

    .right-section h1 {
      font-size: 2.5rem;
      color: #362f30;
      margin-bottom: 15px;
    }

    .right-section p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .buttons a {
      display: inline-block;
      padding: 15px 35px;
      margin: 10px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      color: #fff;
    }

    .buttons a.register {
      background: linear-gradient(45deg, #ff6b81, #ff9472);
    }

    .buttons a.register:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(255, 107, 129, 0.4);
    }

    .buttons a.login {
      background: linear-gradient(45deg, #6aa6ff, #4da8f7);
    }

    .buttons a.login:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(106, 166, 255, 0.4);
    }

    /* Responsive */
    @media (max-width: 800px) {
      .container {
        flex-direction: column;
        padding: 30px 20px;
      }
      .left-section img {
        max-width: 250px;
        margin-bottom: 20px;
      }
      .right-section h1 {
        font-size: 2rem;
      }
    }

  </style>
</head>
<body>

  <div class="container">
    <!-- Left Section -->
    <div class="left-section">
      <img src="{% static 'images/Sakhicare-logo.jpg' %}" alt="SakhiCare Illustration">
    </div>

    <!-- Right Section -->
    <div class="right-section">
      <h1>Welcome to SakhiCare</h1>
      <p>“From Menstruation to Motherhood — We’re With You at Every Step.”</p>
      <div class="buttons">
        <a href="{% url 'login' %}" class="login">Login</a>
        <a href="{% url 'register' %}" class="register">Register</a>
       

      </div>
    </div>
  </div>

</body>
</html>
