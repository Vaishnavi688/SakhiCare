{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Us - SakhiCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Base */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #fef9f0, #ffe5e0);
      color: #333;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Container */
    .emailus-container {
      max-width: 800px;
      margin: 50px auto 80px;
      padding: 0 20px;
    }

    /* Header */
    .emailus-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .emailus-header h1 {
      font-size: 2.5rem;
      color: #ff6b81;
      margin-bottom: 10px;
    }

    .emailus-header p {
      font-size: 1.2rem;
      color: #555;
      line-height: 1.5;
    }

    /* Form */
    .emailus-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-weight: 500;
      color: #555;
    }

    .form-group input,
    .form-group textarea {
      padding: 12px 15px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #ddd;
      width: 100%;
      resize: none;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #ff6b81;
      box-shadow: 0 0 6px rgba(255,107,129,0.3);
    }

    .emailus-btn {
      padding: 12px 0;
      border: none;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff6b81, #ff9472);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .emailus-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255,107,129,0.4);
    }

    /* Info Section */
    .emailus-info {
      background-color: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .emailus-info h3 {
      color: #ff6b81;
      margin-bottom: 12px;
      text-align: center;
    }

    .emailus-info p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 6px;
      text-align: center;
    }

    /* Responsive */
    @media(max-width: 480px) {
      .emailus-header h1 {
        font-size: 2rem;
      }

      .emailus-header p,
      .form-group label,
      .emailus-info p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="emailus-container">

    <!-- Header -->
    <header class="emailus-header">
      <h1>📨 Email Us</h1>
      <p>Have a question, suggestion, or need support?<br>We’d love to hear from you!</p>
    </header>

    <!-- Form -->
    <form class="emailus-form" id="emailForm">
      <div class="form-group">
        <label>👩 Your Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>📧 Your Email</label>
        <input type="email" name="email" placeholder="Enter your email address" required>
      </div>

      <div class="form-group">
        <label>📝 Subject</label>
        <input type="text" name="subject" placeholder="Enter your subject" required>
      </div>

      <div class="form-group">
        <label>💬 Message</label>
        <textarea name="message" placeholder="Write your message here..." rows="5" required></textarea>
      </div>

      <button type="submit" class="emailus-btn">Send Email ✉️</button>
    </form>

    <!-- Info Section -->
    <div class="emailus-info">
      <h3>📍 Our Support Info</h3>
      <p>📧 Email: <b>support@sakhicare.in</b></p>
      <p>📞 Phone: <b>+91 98765 43210</b></p>
      <p>📌 Address: SakhiCare HQ, Pune, India</p>
    </div>

  </div>

  <!-- JavaScript -->
  <script>
    const emailForm = document.getElementById('emailForm');

    emailForm.addEventListener('submit', function(e) {
      e.preventDefault();
      alert("📧 Thank you for reaching out! We’ll respond within 24 hours.");
      emailForm.reset();
    });
  </script>

</body>
</html>
