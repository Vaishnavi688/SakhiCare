<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SakhiCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fef9f0, #ffe5e0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-card {
      background: #fff;
      padding: 40px 30px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-card h2 {
      color: #ff6b81;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input[type="text"], input[type="password"], input[type="email"] {
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
      outline: none;
      border-color: #ff6b81;
      box-shadow: 0 0 8px rgba(255,107,129,0.3);
    }

    button {
      padding: 12px 0;
      border: none;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff6b81, #ff9472);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255,107,129,0.4);
    }

    p {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #555;
    }

    p a {
      color: #ff6b81;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    p a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media(max-width: 480px) {
      .login-card {
        padding: 30px 20px;
      }

      .login-card h2 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Login</h2>
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
    <p>Don’t have an account? <a href="{% url 'register' %}">Register here</a>.</p>
  </div>
</body>
</html>
